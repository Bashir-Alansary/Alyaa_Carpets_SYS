<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
  :root {
    --navy: #0d1f35;
    --navy-light: #162d4a;
    --red: #e8442a;
    --red-light: #ff5c42;
    --red-bg: #fff1ee;
    --success: #059669;
    --success-bg: #ecfdf5;
    --warning: #b45309;
    --warning-bg: #fffbeb;
    --danger: #dc2626;
    --danger-bg: #fef2f2;
    --surface-0: #f0f4f8;
    --surface-1: #f8fafc;
    --surface-2: #ffffff;
    --text-primary: #0d1f35;
    --text-secondary: #4a6080;
    --text-muted: #8fa3bc;
    --border: #e2eaf2;
    --radius: 12px;
    --shadow: 0 2px 12px rgba(13,31,53,0.08);
    --shadow-lg: 0 8px 32px rgba(13,31,53,0.14);
  }
  body { font-family: 'Cairo', 'Segoe UI', Tahoma, Arial, sans-serif; background: var(--surface-0); color: var(--text-primary); min-height: 100vh; padding-bottom: 24px; }
  .app { max-width: 480px; margin: auto; padding: 14px; }
  .header { background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%); border: none; box-shadow: var(--shadow-lg); border-radius: 14px; padding: 14px 16px; margin-bottom: 14px; display: flex; align-items: center; gap: 12px; }
  .header-logo { width: 48px; height: 48px; border-radius: 50%; background: var(--navy); border: 2px solid rgba(232,68,42,0.4); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 20px; flex-shrink: 0; }
  .header-title { font-size: 19px; font-weight: 900; color: #fff; letter-spacing: 0.3px; }
  .header-sub { font-size: 12px; color: var(--red-light); opacity: 0.9; margin-top: 2px; font-weight: 600; }
  .sync-bar { background: var(--surface-2); border: 1px solid var(--border); border-radius: 14px; padding: 9px 14px; margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; box-shadow: var(--shadow); }
  .sync-status { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); }
  .sync-dot.syncing { background: #f59e0b; animation: pulse 1s infinite; }
  .sync-dot.error { background: #ef4444; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .sync-btn { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-size: 12px; color: var(--text-secondary); cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 4px; }
  .sync-btn:active { background: var(--surface-0); }
  .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 14px; }
  .stat-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: 16px; padding: 14px 12px; box-shadow: var(--shadow); transition: transform 0.15s; }
  .stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-val { font-size: 24px; font-weight: 900; color: var(--text-primary); }
  .stat-unit { font-size: 12px; color: var(--text-secondary); font-weight: 400; }
  .tabs { display: flex; gap: 6px; margin-bottom: 14px; background: var(--surface-2); padding: 5px; border-radius: 16px; box-shadow: var(--shadow); }
  .tab { flex: 1; padding: 8px 4px; border: none; border-radius: 12px; background: transparent; font-size: 11px; color: var(--text-muted); cursor: pointer; text-align: center; user-select: none; font-weight: 600; transition: all 0.2s; }
  .tab i { display: block; font-size: 17px; margin-bottom: 2px; }
  .tab.active { background: var(--navy); color: #fff; font-weight: 700; box-shadow: 0 2px 8px rgba(13,31,53,0.25); }
  .section-title { font-size: 13px; font-weight: 700; color: var(--text-secondary); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.8px; }
  .form-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: 20px; padding: 18px; margin-bottom: 14px; box-shadow: var(--shadow); }
  .field { margin-bottom: 12px; }
  .field label { font-size: 13px; color: var(--text-secondary); display: block; margin-bottom: 5px; font-weight: 500; }
  .field input, .field select { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 10px; background: var(--surface-0); color: var(--text-primary); font-size: 15px; font-family: inherit; transition: border-color 0.2s; }
  .field input:focus, .field select:focus { outline: none; border-color: var(--red); background: #fff; box-shadow: 0 0 0 3px rgba(232,68,42,0.1); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn-primary { width: 100%; padding: 13px; background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%); color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 4px; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 14px rgba(13,31,53,0.25); transition: opacity 0.2s; }
  .btn-primary:active { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
  .item-list { display: flex; flex-direction: column; gap: 8px; }
  .item-row { background: var(--surface-2); border: 1px solid var(--border); border-radius: 16px; padding: 13px; display: flex; align-items: center; gap: 10px; box-shadow: var(--shadow); margin-bottom: 2px; }
  .item-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; background: linear-gradient(135deg, #f0f4f8, #e2eaf2); }
  .item-info { flex: 1; min-width: 0; }
  .item-name { font-size: 14px; font-weight: 600; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-meta { font-size: 12px; color: var(--text-muted); margin-top: 3px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .item-qty { text-align: center; min-width: 44px; }
  .item-qty-num { font-size: 20px; font-weight: 700; color: var(--text-primary); }
  .item-qty-lbl { font-size: 11px; color: var(--text-muted); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-ok { background: var(--success-bg); color: var(--success); }
  .badge-low { background: var(--warning-bg); color: var(--warning); }
  .badge-out { background: var(--danger-bg); color: var(--danger); }
  .delete-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 18px; padding: 6px; line-height: 1; }
  .delete-btn:active { color: var(--danger); }
  .history-list { display: flex; flex-direction: column; gap: 8px; }
  .history-item { background: var(--surface-2); border: 1px solid var(--border); border-radius: 16px; padding: 13px 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); }
  .history-name { font-size: 14px; color: var(--text-primary); font-weight: 600; }
  .history-meta { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
  .history-price { font-size: 15px; font-weight: 700; color: var(--success); white-space: nowrap; margin-right: 8px; }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 14px; line-height: 1.8; }
  .empty-state i { font-size: 40px; display: block; margin-bottom: 10px; opacity: 0.4; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1e293b; color: #fff; padding: 11px 22px; border-radius: 22px; font-size: 14px; font-weight: 500; display: none; z-index: 9999; white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.2); font-family: inherit; }
  .total-bar { background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%); border: none; border-radius: 16px; padding: 14px 18px; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow-lg); }
  .total-bar-label { font-size: 13px; color: rgba(255,255,255,0.75); font-weight: 600; }
  .total-bar-val { font-size: 18px; font-weight: 900; color: #fff; }
  .loading { text-align: center; padding: 30px; color: var(--text-muted); font-size: 14px; }
  .loading i { font-size: 30px; display: block; margin-bottom: 8px; animation: spin 1s linear infinite; }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }


  /* USER MANAGEMENT */
  .user-row { background: var(--surface-2); border: 1px solid var(--border); border-radius: 14px; padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; box-shadow: var(--shadow); }
  .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--navy), var(--navy-light)); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; flex-shrink: 0; }
  .user-info { flex: 1; }
  .user-name { font-size: 14px; font-weight: 700; color: var(--text-primary); }
  .user-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  /* AUDIT LOG */
  .audit-row { background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px; padding: 11px 14px; margin-bottom: 7px; display: flex; align-items: flex-start; gap: 10px; box-shadow: var(--shadow); }
  .audit-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; margin-top: 1px; }
  .audit-sell { background: #ecfdf5; }
  .audit-add { background: #eff6ff; }
  .audit-edit { background: #fffbeb; }
  .audit-delete { background: #fef2f2; }
  .audit-login { background: #f5f3ff; }
  .audit-info { flex: 1; }
  .audit-text { font-size: 13px; color: var(--text-primary); font-weight: 600; }
  .audit-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  /* LOW STOCK ALERT */
  .alert-banner { background: linear-gradient(135deg, #b45309, #92400e); color: #fff; border-radius: 14px; padding: 12px 16px; margin-bottom: 14px; display: none; align-items: center; gap: 10px; box-shadow: var(--shadow-lg); }
  .alert-banner.show { display: flex; }
  .alert-text { flex: 1; font-size: 13px; font-weight: 600; }

  /* ITEM IMAGE */
  .item-img { width: 44px; height: 44px; border-radius: 12px; object-fit: cover; flex-shrink: 0; }
  .item-img-placeholder { width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(135deg, #f0f4f8, #e2eaf2); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
  .img-upload-label { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border: 1.5px dashed var(--border); border-radius: 10px; cursor: pointer; color: var(--text-muted); font-size: 13px; background: var(--surface-0); }
  .img-upload-label:hover { border-color: var(--red); color: var(--red); }
  .img-preview { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; margin-top: 8px; display: none; }

  /* REPORT CARD */
  .report-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); }

  /* ADMIN ONLY - hidden for staff */
  .admin-only { }

  /* LOGIN */
  .login-screen { display:none; position:fixed; inset:0; background:linear-gradient(160deg, var(--navy) 0%, #1a0a05 100%); z-index:9998; align-items:center; justify-content:center; padding:20px; flex-direction:column; }
  .login-screen.open { display:flex; }
  .login-card { background:#fff; border-radius:28px; padding:36px 26px; width:100%; max-width:380px; box-shadow: 0 20px 60px rgba(13,31,53,0.35); }
  .login-logo { width:80px; height:80px; border-radius:50%; overflow:hidden; margin:0 auto 16px; display:block; }
  .login-title { text-align:center; font-size:22px; font-weight:900; color:var(--navy); margin-bottom:4px; }
  .login-sub { text-align:center; font-size:13px; color:#6b7280; margin-bottom:24px; }
  .login-field { margin-bottom:14px; }
  .login-field label { font-size:13px; color:#374151; font-weight:600; display:block; margin-bottom:5px; }
  .login-field input { width:100%; padding:12px 14px; border:1.5px solid var(--border); border-radius:12px; font-size:15px; font-family:inherit; background:var(--surface-0); color:var(--text-primary); transition: border-color 0.2s; }
  .login-field input:focus { outline:none; border-color:var(--red); background:#fff; box-shadow: 0 0 0 3px rgba(232,68,42,0.1); }
  .login-btn { width:100%; padding:14px; background:linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%); color:#fff; border:none; border-radius:12px; font-size:16px; font-weight:700; cursor:pointer; font-family:inherit; margin-top:8px; box-shadow: 0 4px 16px rgba(13,31,53,0.3); transition: opacity 0.2s; }
  .login-btn:active { opacity:0.85; }
  .login-error { color:#e8442a; font-size:13px; text-align:center; margin-top:10px; display:none; }
  .login-attempts { color:#92400e; font-size:12px; text-align:center; margin-top:6px; }
  .role-badge { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; margin-right:8px; }
  .role-admin { background:#fde8e8; color:#9b1c1c; }
  .role-staff { background:#def7ec; color:#057a55; }
  .logout-btn { background:none; border:1px solid #e5e7eb; border-radius:6px; padding:4px 10px; font-size:12px; color:#6b7280; cursor:pointer; font-family:inherit; display:flex; align-items:center; gap:4px; }
  .logout-btn:active { background:#f3f4f6; }
  .edit-btn { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 18px; padding: 6px; line-height: 1; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface-2); border-radius: 20px 20px 0 0; padding: 20px 16px 32px; width: 100%; max-width: 480px; }
  .modal-title { font-size: 16px; font-weight: 700; color: var(--text-primary); margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
  .modal-close { background: none; border: none; font-size: 22px; color: var(--text-muted); cursor: pointer; line-height: 1; }
  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 8px; }
  .btn-secondary { width: 100%; padding: 12px; background: var(--surface-0); color: var(--text-primary); border: 1px solid var(--border); border-radius: var(--radius); font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .report-filter { display: flex; gap: 6px; margin-bottom: 14px; background: var(--surface-2); padding: 5px; border-radius: 14px; box-shadow: var(--shadow); }
  .filter-btn { flex: 1; padding: 8px 4px; border: none; border-radius: 10px; background: transparent; font-size: 12px; color: var(--text-muted); cursor: pointer; font-family: inherit; font-weight: 600; transition: all 0.2s; }
  .filter-btn.active { background: var(--navy); color: #fff; font-weight: 700; box-shadow: 0 2px 8px rgba(13,31,53,0.2); }
  .top-item { background: var(--surface-2); border: 1px solid var(--border); border-radius: 16px; padding: 13px 15px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow); }
  .top-rank { width: 28px; height: 28px; border-radius: 50%; background: var(--accent-bg); color: var(--accent-text); font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .top-rank.gold { background: #fef3c7; color: #92400e; }
  .top-rank.silver { background: #f3f4f6; color: #374151; }
  .top-rank.bronze { background: #fde8e8; color: #9b1c1c; }
  .top-info { flex: 1; }
  .top-name { font-size: 14px; font-weight: 600; color: var(--text-primary); }
  .top-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .top-total { font-size: 15px; font-weight: 700; color: var(--success); }
  .btn-clear { width: 100%; padding: 11px; background: none; color: var(--danger); border: 1px solid #fca5a5; border-radius: var(--radius); font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 14px; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .btn-clear:active { background: var(--danger-bg); }

    <div class="btn-row"><button class="btn-secondary" onclick="closeEdit()">إلغاء</button><button class="btn-primary" id="btn-save-edit" onclick="saveEdit()" style="margin-top:0"><i class="ti ti-check"></i> حفظ</button></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby0DP-7SMKiW9r6M5Qdv-GlBTEW8F6YWOtFCkkZHBoTzxqY6sYGadiCxFU_tJDSmOWQQQ/exec';

let items = [];
let sales = [];
let currentUser = null;
let editingUserIndex = -1;

function setSyncStatus(status, text) {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-text');
  dot.className = 'sync-dot' + (status === 'syncing' ? ' syncing' : status === 'error' ? ' error' : '');
  txt.textContent = text;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}

async function loadData() {
  setSyncStatus('syncing', 'جاري التحميل...');
  try {
    const res = await fetch(SCRIPT_URL);

    if (!res.ok) throw new Error('Load failed');

    const data = await res.json();

    items = data.items || [];
    sales = data.sales || [];

    setSyncStatus('ok', 'متزامن مع Google Sheets ✓');

    renderStats();
    renderItems();
    renderHistory();
    checkLowStock();

  } catch (err) {
    console.error(err);
    setSyncStatus('error', 'خطأ في الاتصال');
    showToast('❌ تعذر الاتصال');
  }
}

async function saveData() {
  setSyncStatus('syncing', 'جاري الحفظ...');
  try {
    const cleanItems = items.map(i => ({...i, img: i.img || null}));
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      
      body: JSON.stringify({
          action: "save",
          items: cleanItems,
          sales
      })
    });
    if (!res.ok) throw new Error('save failed');
    setSyncStatus('ok', 'تم الحفظ في السحابة ✓');
  } catch (err) {
    console.error('saveData error:', err);
    setSyncStatus('error', 'خطأ في الحفظ');
    showToast('❌ تعذر الحفظ، تحقق من الإنترنت');
  }
}

async function loadUsers() {

    try {

        const res = await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({
                action: "getUsers"
            })
        });

        const data = await res.json();

        if (data.status === "ok") {

            users = data.users;

            renderUsersList();

        } else {

            showToast("❌ فشل تحميل المستخدمين");

        }

    } catch (err) {

        console.error(err);

        showToast("❌ خطأ أثناء تحميل المستخدمين");

    }

}

let users = [];

function renderUsersList(list = users) {

    const container = document.getElementById("users-list");

    if (!container) return;

    container.innerHTML = "";

    if (!list.length) {

        container.innerHTML = `
            <div class="empty-state">
                لا يوجد مستخدمون
            </div>
        `;

        return;
    }

    list.forEach((user, index) => {

        container.innerHTML += `

        <div class="user-row">

            <div class="user-avatar">
                ${user.name.charAt(0).toUpperCase()}
            </div>

            <div class="user-info">

                <div class="user-name">

                    ${user.name}

                    <span class="role-badge ${
                        user.role === "admin"
                            ? "role-admin"
                            : "role-staff"
                    }">

                        ${user.role}

                    </span>

                </div>

                <div class="user-meta">

                    ${user.username}

                    ${
                        user.active
                        ? '<span style="color:green"> ● مفعل</span>'
                        : '<span style="color:red"> ● معطل</span>'
                    }

                </div>

            </div>

            <button
                class="edit-btn"
                onclick="openUserModal(${index})">

                ✏️

            </button>

        </div>

        `;

    });

}

function switchTab(tab) {
  const isAdmin = currentUser && currentUser.role === "admin";
  const staffOnly = ['inventory', 'sell'];
  if (!isAdmin && !staffOnly.includes(tab)) return;
  const tabs = ['inventory','add','sell','history','reports','users','audit'];
  tabs.forEach((t, i) => {
    const el = document.getElementById('tab-'+t);
    if (el) el.style.display = t === tab ? 'block' : 'none';
    const tabEl = document.querySelectorAll('.tab')[i];
    if (tabEl) tabEl.classList.toggle('active', t === tab);
  });
  if (tab === 'sell') renderSellSelect();
  if (tab === 'history') renderHistory();
  if (tab === 'inventory') renderItems();
  if (tab === 'reports') renderReports();
  if (tab === 'users') loadUsers();
  // if (tab === 'audit') renderAuditLog();
}

function renderStats() {
  const totalItems = items.reduce((s,i) => s + Number(i.qty), 0);
  const totalSales = sales.reduce((s,i) => s + Number(i.total), 0);
  const lowStock = items.filter(i => Number(i.qty) > 0 && Number(i.qty) <= Number(i.min)).length;
  const outStock = items.filter(i => Number(i.qty) === 0).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="stat-label">إجمالي المخزون</div><div class="stat-val">${totalItems} <span class="stat-unit">قطعة</span></div></div>
    <div class="stat-card"><div class="stat-label">إجمالي المبيعات</div><div class="stat-val">${Number(totalSales).toLocaleString()} <span class="stat-unit">ج</span></div></div>
    <div class="stat-card"><div class="stat-label">أصناف منخفضة</div><div class="stat-val" style="color:#92400e">${lowStock}</div></div>
    <div class="stat-card"><div class="stat-label">أصناف نفدت</div><div class="stat-val" style="color:#9b1c1c">${outStock}</div></div>`;
}

function renderItems() {
  const el = document.getElementById('item-list');
  if (!items.length) {
    el.innerHTML = '<div class="empty-state"><i class="ti ti-package"></i>لا يوجد أصناف بعد<br>اضغط "إضافة" لإضافة أول صنف</div>';
    return;
  }
  const isAdmin = currentUser && currentUser.role === 'admin';
  el.innerHTML = '<div class="item-list">' + items.map((item, i) => {
    const icon = item.type === 'سجاد' ? '🟫' : '🟨';
    const imgHtml = item.img
      ? `<img class="item-img" src="${item.img}">`
      : `<div class="item-img-placeholder">${icon}</div>`;
    const qty = item.unit === "متر"
    ? Number(item.qty).toFixed(2).replace(/\.00$/, "")
    : Number(item.qty);
    const min = Number(item.min);
    const badge = qty === 0 ? '<span class="badge badge-out">نفد</span>' : qty <= min ? '<span class="badge badge-low">منخفض</span>' : '<span class="badge badge-ok">متاح</span>';
    return `<div class="item-row">
      ${imgHtml}
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-meta">
            ${item.type} ·
            ${Number(item.price).toLocaleString()} ج / ${item.unit}
            · ${badge}
        </div>
      </div>
      <div class="item-qty"><div class="item-qty-num">${qty}</div><div class="item-qty-lbl">${item.unit}</div></div>
      ${isAdmin ? `<button class="edit-btn" onclick="openEdit(${i})"><i class="ti ti-edit"></i></button><button class="delete-btn" onclick="deleteItem(${i})"><i class="ti ti-trash"></i></button>` : ''}
    </div>`;
  }).join('') + '</div>';
}

function renderSellSelect() {

    const s = document.getElementById('sell-item');

    const available = items.filter(i => Number(i.qty) > 0);

    if (!available.length) {

        s.innerHTML = '<option>لا يوجد أصناف متاحة</option>';
        return;

    }

    s.innerHTML = available.map(item => {

        const qty = item.unit === "متر"
            ? Number(item.qty).toFixed(2).replace(/\.00$/, "")
            : Number(item.qty);

        return `
            <option value="${items.indexOf(item)}">
                ${item.name} (${qty} ${item.unit})
            </option>
        `;

    }).join('');

    updateSellPrice();

}

function updateSellPrice() {

    const idx = parseInt(document.getElementById('sell-item').value);

    if (isNaN(idx) || !items[idx]) return;

    const item = items[idx];

    document.getElementById('sell-price').value = item.price;

    // تحديث تسمية السعر حسب الوحدة
    const priceLabel = document.getElementById("sell-price-label");
    if (priceLabel) {
        priceLabel.textContent = item.unit === "متر"
            ? "سعر المتر"
            : "سعر القطعة";
    }

    // تحديث تسمية الكمية حسب الوحدة
    const qtyLabel = document.getElementById("sell-qty-label");
    if (qtyLabel) {
        qtyLabel.textContent = item.unit === "متر"
            ? `الكمية (متر) - المتاح ${item.qty}`
            : `الكمية (قطعة) - المتاح ${item.qty}`;
    }

    // السماح بالكسور للمتر فقط
    const qtyInput = document.getElementById("sell-qty");
    qtyInput.step = item.unit === "متر" ? "0.01" : "1";
}

function renderHistory() {
  const el = document.getElementById('history-list');
  const total = sales.reduce((s,i) => s + Number(i.total), 0);
  document.getElementById('total-sales-val').textContent = total.toLocaleString() + ' جنيه';
  if (!sales.length) {
    el.innerHTML = '<div class="empty-state"><i class="ti ti-receipt"></i>لا توجد مبيعات بعد</div>';
    return;
  }
  el.innerHTML = [...sales].reverse().slice(0, 30).map(s => `
    <div class="history-item">
      <div><div class="history-name">${s.name}</div><div class="history-meta">${s.qty} قطعة · ${s.date}</div></div>
      <div class="history-price">+${Number(s.total).toLocaleString()} ج</div>
    </div>`).join('');
}

function addAuditLog(action, message) {
    console.log(`[${action}] ${message}`);
}

async function addItem() {
  if (!isAdmin()) {
      alert("ليس لديك صلاحية لإضافة منتجات");
      return;
  }
  const type = document.getElementById('add-type').value;
  const unit = document.getElementById('add-unit').value;
  const unitText = unit === "متر" ? "متر" : "قطعة";
  const name = document.getElementById('add-name').value.trim();
  const qty = unit === "متر"
    ? (parseFloat(document.getElementById('add-qty').value) || 0)
    : (parseInt(document.getElementById('add-qty').value) || 0);
  const price = parseInt(document.getElementById('add-price').value) || 0;
  const min = unit === "متر"
    ? (parseFloat(document.getElementById('add-min').value) || 2)
    : (parseInt(document.getElementById('add-min').value) || 2);
  if (!name) { showToast('❌ ادخل اسم الصنف'); return; }
  if (unit === "قطعة" && !Number.isInteger(qty)) {
    showToast("❌ عدد القطع يجب أن يكون رقمًا صحيحًا");
    return;
}
  const btn = document.getElementById('btn-add');
  btn.disabled = true;
  const imgData = null;
  const existing = items.findIndex(i => i.name === name && i.unit === unit);
  if (existing >= 0) {
    items[existing].qty = Number(items[existing].qty) + qty;
    if (imgData) items[existing].img = imgData;
    addAuditLog('add', `أضاف ${qty} ${unitText} لـ "${name}"`);
    showToast(`✅ تمت إضافة ${qty} ${unitText} لـ ${name}`);
  } else {
    items.push({ type, name, unit, qty, price, min, img: imgData || null });
    addAuditLog('add', `أضاف صنف جديد: "${name}" (${qty} ${unitText})`);
    showToast(`✅ تمت إضافة ${name}`);
  }
  await saveData();
  renderStats(); renderItems(); checkLowStock();
  document.getElementById('add-name').value = '';
  document.getElementById('add-qty').value = '';
  document.getElementById('add-price').value = '';
  const preview = document.getElementById('add-img-preview');
  if (preview) { preview.src = ''; preview.style.display = 'none'; }
  const imgInput = document.getElementById('add-img');
  if (imgInput) imgInput.value = '';
  btn.disabled = false;
}

async function sellItem() {
  const idx = parseInt(document.getElementById('sell-item').value);

  if (isNaN(idx)) {
      showToast('❌ اختر صنف أولاً');
      return;
  }

  const item = items[idx];

  const qty = item.unit === "متر"
      ? (parseFloat(document.getElementById('sell-qty').value) || 0)
      : (parseInt(document.getElementById('sell-qty').value) || 0);
      if (qty <= 0) {
          showToast("❌ أدخل كمية صحيحة");
          return;
      }

      if (item.unit === "قطعة" && !Number.isInteger(qty)) {
          showToast("❌ لا يمكن بيع نصف قطعة");
          return;
      }
  const price = parseFloat(document.getElementById('sell-price').value) || 0;
  if (qty > Number(item.qty)) { showToast('❌ الكمية أكبر من المتاح'); return; }
  const btn = document.getElementById('btn-sell');
  btn.disabled = true;
  item.qty = Number(item.qty) - qty;
  const now = new Date();
  const date = `${now.getDate()}/${now.getMonth()+1}/${now.getFullYear()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  sales.push({
    name: item.name,
    type: item.type,
    unit: item.unit,
    qty,
    unitPrice: price,
    total: qty * price,
    date,
    seller: currentUser.username
});
  addAuditLog(
      'sell',
      `باع ${qty} ${item.unit} من "${item.name}" بـ ${(qty * price).toLocaleString()} جنيه`
  );
  await saveData();
  renderStats(); renderSellSelect();
  showToast(
      `✅ تم تسجيل بيع ${qty} ${item.unit} بـ ${(qty * price).toLocaleString()} جنيه`
  );
  document.getElementById('sell-qty').value = '';
  btn.disabled = false;
}

async function deleteItem(i) {

    if (!isAdmin()) {
        alert("ليس لديك صلاحية لحذف المنتجات");
        return;
    }

    if (confirm(`هتحذف "${items[i].name}"؟`)) {

        addAuditLog('delete', `حذف صنف: "${items[i].name}"`);

        items.splice(i, 1);

        await saveData();

        renderStats();
        renderItems();
        checkLowStock();

        showToast('🗑️ تم الحذف');
    }
}

let currentFilter = 'month';

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach((b,i) => {
    b.classList.toggle('active', ['day','week','month','all'][i] === f);
  });
  renderReports();
}

function filterSalesByPeriod(f) {
  const now = new Date();
  return sales.filter(s => {
    if (f === 'all') return true;
    const parts = s.date.split(' ')[0].split('/');
    const d = new Date(parts[2], parts[1]-1, parts[0]);
    if (f === 'day') return d.toDateString() === now.toDateString();
    if (f === 'week') { const diff = (now - d) / 86400000; return diff <= 7; }
    if (f === 'month') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    return true;
  });
}

function renderReports() {
  const filtered = filterSalesByPeriod(currentFilter);
  const totalRev = filtered.reduce((s,i) => s + Number(i.total), 0);
  const totalQty = filtered.reduce((s,i) => s + Number(i.qty), 0);
  const totalTx = filtered.length;

  const labels = { day: 'اليوم', week: 'الأسبوع', month: 'الشهر الحالي', all: 'إجمالي كل الوقت' };
  document.getElementById('report-top-title').textContent = 'الأكثر مبيعاً — ' + labels[currentFilter];

  document.getElementById('report-stats').innerHTML = `
    <div class="stat-card"><div class="stat-label">إجمالي الإيرادات</div><div class="stat-val">${totalRev.toLocaleString()} <span class="stat-unit">ج</span></div></div>
    <div class="stat-card"><div class="stat-label">قطع مباعة</div><div class="stat-val">${totalQty} <span class="stat-unit">قطعة</span></div></div>
    <div class="stat-card"><div class="stat-label">عدد الصفقات</div><div class="stat-val">${totalTx}</div></div>
    <div class="stat-card"><div class="stat-label">متوسط الصفقة</div><div class="stat-val">${totalTx ? Math.round(totalRev/totalTx).toLocaleString() : 0} <span class="stat-unit">ج</span></div></div>`;

  const byItem = {};
  filtered.forEach(s => {
    if (!byItem[s.name]) byItem[s.name] = { qty: 0, total: 0 };
    byItem[s.name].qty += Number(s.qty);
    byItem[s.name].total += Number(s.total);
  });
  const sorted = Object.entries(byItem).sort((a,b) => b[1].total - a[1].total);
  const rankClass = ['gold','silver','bronze'];
  const el = document.getElementById('report-top-list');
  if (!sorted.length) {
    el.innerHTML = '<div class="empty-state"><i class="ti ti-chart-bar"></i>لا توجد مبيعات في هذه الفترة</div>';
    return;
  }
  el.innerHTML = sorted.map(([name, d], i) => `
    <div class="top-item">
      <div class="top-rank ${rankClass[i] || ''}">${i+1}</div>
      <div class="top-info">
        <div class="top-name">${name}</div>
        <div class="top-meta">${d.qty} قطعة مباعة</div>
      </div>
      <div class="top-total">${d.total.toLocaleString()} ج</div>
    </div>`).join('');
}

async function clearSales() {
  if (!confirm('هتمسح كل سجل المبيعات والإجمالي هيرجع صفر، متأكد؟')) return;
  sales = [];
  await saveData();
  renderStats();
  renderHistory();
  showToast('🗑️ تم مسح سجل المبيعات');
}

let editIndex = -1;

function openEdit(i) {

    if (!isAdmin()) {
        alert("ليس لديك صلاحية لتعديل المنتجات");
        return;
    }

    editIndex = i;

    const item = items[i];

    document.getElementById('edit-type').value = item.type;
    document.getElementById('edit-name').value = item.name;
    document.getElementById('edit-qty').value = item.qty;
    document.getElementById('edit-price').value = item.price;
    document.getElementById('edit-min').value = item.min;

    document.getElementById('edit-modal').classList.add('open');
}

function closeEdit() {
  document.getElementById('edit-modal').classList.remove('open');
  editIndex = -1;
}

async function saveEdit() {
  if (!isAdmin()) {
      alert("ليس لديك صلاحية لتعديل المنتجات");
      return;
  }
  if (editIndex < 0) return;
  const btn = document.getElementById('btn-save-edit');
  btn.disabled = true;
  items[editIndex] = {
    type: document.getElementById('edit-type').value,
    name: document.getElementById('edit-name').value.trim(),
    qty: parseInt(document.getElementById('edit-qty').value) || 0,
    price: parseInt(document.getElementById('edit-price').value) || 0,
    min: parseInt(document.getElementById('edit-min').value) || 2,
  };
  addAuditLog('edit', `عدّل صنف: "${items[editIndex].name}"`);
  await saveData();
  renderStats(); renderItems(); checkLowStock();
  closeEdit();
  showToast('✅ تم التعديل');
  btn.disabled = false;
}

function checkLowStock() {
    const lowStockItems = items.filter(item => Number(item.qty) <= Number(item.min));

    if (lowStockItems.length > 0) {
        showToast(`⚠ يوجد ${lowStockItems.length} صنف أوشك على النفاد`);
    }
}

function showLoginScreen() {
    document.getElementById("loginScreen").style.display = "flex";
    document.getElementById("app").style.display = "none";
}

function showMainApp() {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("app").style.display = "block";
}

function checkAuth() {

    const saved = localStorage.getItem("currentUser");

    if(saved){

        currentUser = JSON.parse(saved);

        applyPermissions();

        showMainApp();

        loadData();

    }else{

        showLoginScreen();

    }

}

async function login(){
  console.log("Login started");

    const username =
        document.getElementById("loginUsername").value;

    const password =
        document.getElementById("loginPassword").value;

        console.log("Username:", username);
        console.log("Password:", password);

    const res = await fetch(SCRIPT_URL,{

        method: "POST",
        body: JSON.stringify({
            action: "login",
            username,
            password
        })

    });
    

    const data = await res.json();
    console.log(data);

    if(data.status=="ok"){

      currentUser = data.user;

      localStorage.setItem("currentUser", JSON.stringify(currentUser));

      applyPermissions();

      showMainApp();

      loadData();

    }else{

        document.getElementById("loginError").innerHTML =
            "اسم المستخدم أو كلمة المرور غير صحيحة";

    }

}

function applyPermissions() {

    if (!currentUser) return;

    const adminOnly = document.querySelectorAll(".admin-only");

    adminOnly.forEach(el => {

        if (currentUser.role !== "admin") {
            el.style.display = "none";
        } else {
            el.style.display = "";
        }

    });

}

async function addUser() {

    if (!isAdmin()) {
        showToast("❌ ليس لديك صلاحية");
        return;
    }

    const name = document.getElementById("new-name").value.trim();
    const username = document.getElementById("new-user").value.trim();
    const password = document.getElementById("new-pass").value.trim();
    const role = document.getElementById("new-role").value;

    if (!name || !username || !password) {
        showToast("❌ أكمل جميع البيانات");
        return;
    }

    try {

        const res = await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({
                action: "addUser",
                name,
                username,
                password,
                role
            })
        });

        const data = await res.json();

        if (data.status === "ok") {

            showToast("✅ تم إضافة المستخدم");

            document.getElementById("new-name").value = "";
            document.getElementById("new-user").value = "";
            document.getElementById("new-pass").value = "";
            document.getElementById("new-role").value = "cashier";

            await loadUsers();

        } else {

            showToast("❌ " + data.message);

        }

    } catch (err) {

        console.error(err);

        showToast("❌ حدث خطأ");

    }

}

function openUserModal(index) {

    editingUserIndex = index;

    const user = users[index];

    document.getElementById("edit-user-name").value = user.name;
    document.getElementById("edit-user-username").value = user.username;
    document.getElementById("edit-user-password").value = "";
    document.getElementById("edit-user-role").value = user.role;
    document.getElementById("edit-user-active").checked = user.active;

    document.getElementById("user-modal").classList.add("open");

}

function closeUserModal() {

    editingUserIndex = -1;

    document.getElementById("user-modal").classList.remove("open");

}

async function saveUser() {

    if (editingUserIndex < 0) return;

    const user = users[editingUserIndex];

    const updatedUser = {
        name: document.getElementById("edit-user-name").value.trim(),
        username: document.getElementById("edit-user-username").value.trim(),
        password: document.getElementById("edit-user-password").value.trim(),
        role: document.getElementById("edit-user-role").value,
        active: document.getElementById("edit-user-active").checked
    };

    const res = await fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({
            action: "updateUser",
            oldUsername: user.username,
            newData: updatedUser
        })
    });

    const data = await res.json();

    if (data.status === "ok") {

        // تحديث محلي
        users[editingUserIndex] = {
            ...user,
            ...updatedUser,
            password: updatedUser.password || user.password
        };

        renderUsersList();
        closeUserModal();

        showToast("✅ تم حفظ التعديلات");

    } else {

        showToast("❌ فشل في الحفظ");

    }
}

async function deleteUser() {

    if (editingUserIndex < 0) return;

    const user = users[editingUserIndex];

    if (!confirm(`هل أنت متأكد من حذف المستخدم: ${user.name} ؟`)) {
        return;
    }

    const res = await fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({
            action: "deleteUser",
            username: user.username
        })
    });

    const data = await res.json();

    if (data.status === "ok") {

        users.splice(editingUserIndex, 1);

        renderUsersList();
        closeUserModal();

        showToast("🗑️ تم حذف المستخدم");

    } else {

        showToast("❌ فشل الحذف");

    }
}

function isAdmin() {
    return currentUser && currentUser.role === "admin";
}

function changeUnitLabels() {

    const unit = document.getElementById("add-unit").value;

    const qtyLabel = document.getElementById("qty-label");
    const priceLabel = document.getElementById("price-label");
    const minLabel = document.getElementById("min-label");

    const qtyInput = document.getElementById("add-qty");
    const minInput = document.getElementById("add-min");

    if (unit === "قطعة") {

        qtyLabel.textContent = "عدد القطع";
        priceLabel.textContent = "سعر القطعة";
        minLabel.textContent = "الحد الأدنى (عدد القطع)";

        qtyInput.step = "1";
        qtyInput.placeholder = "مثال: 10";

        minInput.step = "1";
        minInput.placeholder = "2";

    } else {

        qtyLabel.textContent = "عدد الأمتار";
        priceLabel.textContent = "سعر المتر";
        minLabel.textContent = "الحد الأدنى (بالمتر)";

        qtyInput.step = "0.01";
        qtyInput.placeholder = "مثال: 12.50";

        minInput.step = "0.01";
        minInput.placeholder = "1.50";

    }

}

function logout() {

    localStorage.removeItem("currentUser");

    currentUser = null;

    location.reload();

}

checkAuth();
</script>
